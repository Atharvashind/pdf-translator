services:
  - type: web
    name: pdf-translator-backend
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt && apt-get install -y tesseract-ocr tesseract-ocr-mar poppler-utils"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
